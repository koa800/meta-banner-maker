# Agent Orchestrator Configuration

agent:
  name: "mac-mini-agent"
  log_level: "INFO"

paths:
  # 既定の deploy root。起動時は orchestrator.py が
  # ADDNESS_DEPLOY_ROOT / ADDNESS_CONFIG_PATH を優先して正規化する。
  repo_root: "~/Desktop/cursor"
  system_dir: "~/Desktop/cursor/System"
  master_dir: "~/Desktop/cursor/Master"
  skills_dir: "~/Desktop/cursor/Skills"
  db_path: "~/Desktop/cursor/System/mac_mini/agent_orchestrator/agent.db"
  log_dir: "~/Desktop/cursor/System/mac_mini/agent_orchestrator/logs"

hinata:
  enabled: false
  pause_reason: "2026-03-13 優先順位を Codex → 秘書 → 日向 に切り替えるため一時停止"

# スケジュール設計方針:
#   - 同じ時刻に複数タスクを並べない（1つずつ順番に実行する）
#   - 重いタスク（API呼び出しあり）は最低5分空ける
#   - 軽いタスク（ローカル処理のみ）は間隔短くてOK
schedule:
  # === 朝の流れ ===
  sheets_sync:
    cron: "30 6 * * *"           # 06:30  データ準備（他より先に実行）
    enabled: true
  cdp_sync:
    cron: "0 */2 * * *"          # 2時間ごと  CDP同期（データソース→マスタ + 経路別タブ→集客データ）
    enabled: true
  unique_email_sheet_sync:
    cron: "18 */2 * * *"         # 2時間ごと  UUメールアドレス管理シートを再生成
    enabled: false
  email_registration_count_sheet_sync:
    cron: "28 */2 * * *"         # 2時間ごと  全メール登録件数管理シートを再生成
    enabled: false
  email_collection_metrics_sheet_sync:
    cron: "38 */2 * * *"         # 2時間ごと  メール集計の統合シートを再生成
    enabled: true
  booking_notification_log_sync:
    cron: "43 */2 * * *"         # 2時間ごと  個別予約通知ログを更新
    enabled: true
  booking_metrics_sheet_sync:
    cron: "48 */2 * * *"         # 2時間ごと  個別面談データの集計シートを再生成
    enabled: true
  membership_collection_sheet_sync:
    cron: "53 */2 * * *"         # 2時間ごと  会員データ（収集）を更新
    enabled: true
  membership_metrics_sheet_sync:
    cron: "58 */2 * * *"         # 2時間ごと  会員データ（加工）を更新
    enabled: true
  teleapo_sync:
    cron: "15 6 * * *"           # 06:15  AIテレアポ対象を顧客マスタから再生成
    enabled: true
  interview_insights_sync:
    cron: "50 * * * *"           # 毎時50分  新規/直近の定性欄を補完（最大20件）
    enabled: true
  interview_insights_backfill:
    cron: "20 1 * * *"           # 01:20  面談定性の backlog をまとめて処理（最大600件目安）
    enabled: true
  interview_insights_analysis:
    cron: "20 5 * * *"           # 05:20  LTV別の面談定性比較を再生成
    enabled: true
  addness_fetch:
    cron: "0 8 */3 * *"          # 08:00  Addnessゴールツリー取得（3日ごと）
    enabled: true
  addness_smoke_test:
    cron: "45 6 * * *"           # 06:45  Addness主要操作のスモークテスト（テスト配下）
    enabled: true
  ai_news:
    cron: "10 8 * * *"           # 08:10  AIニュース収集
    enabled: true
  looker_session_keepalive:
    cron: "0 7 * * *"            # 07:00  Looker Studio セッション維持（CDP でページを開いて閉じる）
    enabled: true
  oauth_health_check:
    cron: "25 8 * * *"           # 08:25  認証チェック（Google + Claude Code OAuth）※日報入力(08:40)の前に実行
    enabled: true
  anthropic_credit_check:
    cron: "20 8 * * mon"         # 月曜 08:20  Anthropic APIクレジット残高チェック
    enabled: false
  openai_credit_check:
    cron: "0 9,15,21 * * *"     # 不要（llm_routerが毎回の呼び出し時に自動チェック）
    enabled: false
  daily_addness_digest:
    cron: "30 8 * * *"           # 08:30  朝のブリーフィング
    enabled: true
  addness_activity_watch:
    cron: "55 8 * * *"           # 08:55  Addness行動ログを集計して優先操作を更新
    enabled: true
  addness_goal_check:
    cron: "0 9 * * *"            # 09:00  ゴール→やることリスト整理
    enabled: true

  # === 朝の定常業務 ===
  daily_report_input:
    cron: "40 8 * * *"           # 08:40  日報自動入力（秘書がClaude Codeで実行）※OAuthチェック後
    enabled: true
  daily_report_verify:
    cron: "20 9 * * *"           # 09:20  日報入力の完了検証（シートの実データ確認）
    enabled: true

  # === 秘書自律ワーク ===
  secretary_proactive_work:
    cron: "0 10,14,17 * * mon-fri"  # 平日 10:00/14:00/17:00（secretary_goal_progress に統合）
    enabled: false
  secretary_goal_progress:
    interval_minutes: 30         # 30分ごとに発火（空き時間判定あり）
    enabled: true

  # === 日報リマインド ===
  daily_report_reminder:
    cron: "0 12,19 * * mon-fri"    # 2026-03-16 以降は無効化（広告チームLINEグループへの自動催促を停止）
    enabled: false

  # === 日中 ===
  looker_csv_download:
    cron: "30 11 * * *"          # 11:30  Looker Studio CSVダウンロード（前々日分。12:00のkpi_daily_importの前に実行）
    enabled: true
  mail_inbox_personal:
    cron: "0 */3 * * *"          # 3時間ごと :00  個人メール確認
    enabled: true
  mail_inbox_kohara:
    cron: "5 */3 * * *"          # 3時間ごと :05  koharaメール確認（5分ズラし）
    enabled: true
  security_action_watch:
    cron: "15 */3 * * *"         # 3時間ごと :15  SECURITY ACTION自己宣言IDメール確認
    enabled: true
  kpi_daily_import:
    cron: "0 12 * * *"           # 12:00  KPIデータ投入
    enabled: true
  kpi_anomaly_check:
    cron: "5 12 * * *"           # 12:05  KPI異常検知（投入直後に分析→異常時LINE通知）
    enabled: true

  # === 夜の流れ ===
  daily_report:
    cron: "0 21 * * *"           # 21:00  日次レポート
    enabled: false
  daily_group_digest:
    cron: "10 21 * * *"          # 21:10  グループLINEダイジェスト
    enabled: true
  kpi_nightly_cache:
    cron: "0 22 * * *"           # 22:00  KPIキャッシュ再生成
    enabled: true

  # === 月次 ===
  monthly_invoice_submission:
    cron: "30 9 3 * *"            # 毎月3日 09:30  請求書作成・提出（INVOY→フォーム→Drive）
    enabled: true

  # === 週次 ===
  meeting_report:
    cron: "0 15 * * fri"          # 金曜 15:00  経営会議資料自動作成（Sheets正本, Python生成）
    enabled: true

  weekly_idea_proposal:
    cron: "0 9 * * mon"          # 月曜 09:00  アイデア提案
    enabled: true
  weekly_stats:
    cron: "30 9 * * mon"         # 月曜 09:30  週次レポート
    enabled: true
  weekly_content_suggestions:
    cron: "0 10 * * wed"         # 水曜 10:00  コンテンツ提案
    enabled: true
  weekly_profile_learning:
    cron: "0 10 * * sun"         # 日曜 10:00  プロファイル学習
    enabled: true
  os_sync_session:
    cron: "0 20 * * fri"         # 金曜 20:00  OSすり合わせ（秘書→甲原）
    enabled: true
  weekly_hinata_memory:
    cron: "30 10 * * sun"        # 日曜 10:30  日向の記憶統合（profile_learningの後）
    enabled: false               # 2026-03-13 日向一時停止（優先順位: Codex → 秘書 → 日向）
  video_knowledge_review:
    cron: "0 11 * * sun"         # 日曜 11:00  動画知識ライフサイクルレビュー（hinata_memoryの後）
    enabled: true
  ds_insight_biweekly_report:
    cron: "30 11 * * sun"        # 日曜 11:30  DS.INSIGHTレポート（Python側で隔週判定）
    enabled: true
  ds_insight_mail_collect:
    cron: "0 10 * * 1,2,4"      # 月火木 10:00  DS.INSIGHTメール回収（通知なし、失敗時3h後リトライ）
    enabled: true
  ds_insight_weekly_digest:
    cron: "0 10 * * fri"         # 金曜 10:00  DS.INSIGHT週次レポート（1週間分まとめてAI要約→LINE通知）
    enabled: true
  video_learning_reminder:
    interval_minutes: 30         # 承認待ち動画知識のリマインド（1時間経過でLINE通知）
    enabled: true

  # === 常時監視（軽量・ローカル処理） ===
  health_check:
    interval_minutes: 1          # 死活監視・自動復旧（重要定常の取りこぼし補走を1分以内に寄せる）
    enabled: true
  git_pull_sync:
    interval_minutes: 5          # GitHubから同期
    enabled: true
  render_health_check:
    interval_minutes: 30         # Renderサーバー監視
    enabled: true
  hinata_addness_feedback_check:
    interval_minutes: 10         # 日向のAddness未解決コメントを検知 → LINE承認フローへ登録
    enabled: false               # 2026-03-13 日向一時停止（優先順位: Codex → 秘書 → 日向）
  repair_check:
    interval_minutes: 30         # エラー検知・修復提案
    enabled: false               # 2026-03-02 クレジット消費過多のため一時停止

  # === 深夜 ===
  log_rotate:
    cron: "0 3 * * *"            # 03:00  ログ圧縮
    enabled: true

  # === Slack連携（秘書が監視・日向に指示を渡す） ===
  slack_dispatch:
    interval_seconds: 15         # Slack #ai-team 監視 → 日向タスクキューへ
    enabled: false               # 2026-03-13 日向一時停止（優先順位: Codex → 秘書 → 日向）
  slack_hinata_auto_reply:
    interval_seconds: 15         # 日向のSlack報告に秘書が返答
    enabled: false               # 2026-03-13 日向一時停止（優先順位: Codex → 秘書 → 日向）

  # === 無効化済み ===
  slack_ai_team_check:
    interval_minutes: 30
    enabled: false               # slack_dispatch に統合
  hinata_activity_check:
    cron: "0 21 * * *"
    enabled: false               # slack_dispatch + slack_hinata_auto_reply で代替

webhook:
  host: "0.0.0.0"
  port: 8500
  enabled: true

notifications:
  line_notify_token_secret: "LINE_NOTIFY_TOKEN"
  slack_webhook_secret: "SLACK_WEBHOOK_URL"

safety:
  api_call_limit_per_hour: 100
  require_approval_for_external: true
  max_task_duration_seconds: 300

llm:
  provider: "anthropic"
  model: "claude-sonnet-4-6"
  max_tokens: 4096
